<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場報工系統 - 作業端</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; font-size: 13px; }
        .header-bar { background-color: #1e2b3c; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 45px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .header-title { font-size: 14px; font-weight: bold; }
        .top-nav { display: flex; gap: 5px; }
        .nav-btn { padding: 4px 12px; border-radius: 4px; font-weight: 600; font-size: 12px; cursor: pointer; color: #b2bec3; background: transparent; border: 1px solid transparent; transition: 0.2s; text-decoration: none; }
        .nav-btn.active { background-color: #3498db; color: white; }
        .nav-link-set { color: #f1c40f; border: 1px solid #f1c40f; }
        .nav-logout { color: #ff7675; border: 1px solid #ff7675; }

        .main-wrapper { max-width: 1400px; margin: 15px auto; padding: 0 15px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: start; }
        .panel-wrapper { background: white; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); border: 1px solid #dcdde1; margin-bottom: 15px; overflow: hidden; }
        .form-group { padding: 12px 15px; border-bottom: 1px solid #ecf0f1; }
        .form-group:last-child { border-bottom: none; }
        label.title { font-weight: bold; color: #2c3e50; font-size: 13px; display: block; margin-bottom: 10px; }
        
        .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; }
        .col { flex: 1; min-width: 0; }
        .col label { display: block; font-size: 11px; color: #7f8c8d; margin-bottom: 3px; font-weight: 600; }
        input, select { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #cdd3d8; border-radius: 4px; background: white; font-size: 13px; }
        
        .toggle-btn { flex: 1; padding: 7px; text-align: center; border: 1px solid #cdd3d8; border-radius: 4px; cursor: pointer; font-weight: bold; background: white; font-size: 12px; transition: 0.2s; }
        .toggle-btn.active { background-color: #3498db; color: white; border-color: #3498db; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; padding: 5px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 4px; }
        .checkbox-item input { width: auto; }

        .dynamic-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; background: #fafafa; padding: 6px; border-radius: 4px; border: 1px solid #eee; }
        .btn-add { background: #eef9fe; color: #2980b9; border: 1px solid #b9dbe6; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-remove { background: #fff5f5; border: 1px solid #ffcccc; color: #e74c3c; cursor: pointer; font-size: 12px; padding: 4px 10px; border-radius: 4px; }
        .btn-submit { padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }

        #detail-view { display: none; }
        .report-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 12px; background: #fff; }
    </style>
</head>
<body>

    <header class="header-bar">
        <div class="header-title" id="welcomeMsg">🏗️ 現場報工系統</div>
        <div class="top-nav">
            <button class="nav-btn active" id="nav-form">📝 填寫報工</button>
            <button class="nav-btn" id="nav-list">📋 當日明細</button>
            <a href="settings.html" class="nav-btn nav-link-set" id="nav-settings">⚙️ 基本設定</a>
            <button class="nav-btn nav-logout" onclick="handleLogout()">🚪 登出</button>
        </div>
    </header>

    <div class="main-wrapper">
        <div id="form-view" class="grid-container">
            <div class="panel-wrapper">
                <div class="form-group">
                    <label class="title">📋 基本資訊</label>
                    <div class="row">
                        <div class="col" style="flex: 1.5;"><label>專案名稱</label><select id="projectName"><option value="">載入專案中...</option></select></div>
                        <div class="col"><label>工務人員</label><input type="text" id="staffName" readonly style="background:#f0f0f0;"></div>
                        <div class="col" style="flex: 1.2;"><label>報工日期</label><input type="date" id="reportDate"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="title">📅 日報類別</label>
                    <div class="type-group" style="display:flex; gap:6px;">
                        <div class="toggle-btn" onclick="toggleActive(this)">內業工程</div>
                        <div class="toggle-btn" onclick="toggleActive(this)">進度工程</div>
                        <div class="toggle-btn active" onclick="toggleActive(this)">現場作業</div>
                        <div class="toggle-btn" onclick="toggleActive(this)">其他</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="title">🚧 施工類別</label>
                    <div class="row">
                        <div class="col"><label>施工大類</label><select id="mainCategory"><option value="">載入中...</option></select></div>
                        <div class="col"><label>作業細項</label><select id="subCategory"><option value="">請先選擇大類</option></select></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="title">📍 施工位置</label>
                    <div style="display:flex; gap:20px;">
                        <div class="col">
                            <label>棟別</label>
                            <div id="buildingGroup" class="checkbox-group">載入中...</div>
                        </div>
                        <div class="col" style="flex:2;">
                            <label>樓層</label>
                            <div id="floorGroup" class="checkbox-group">載入中...</div>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="background-color: #fbfcfc;">
                    <label class="title">⏳ 施工時程</label>
                    <div class="row">
                        <div class="col"><label>計劃日期 (起)</label><input type="date" id="planStartDate"></div>
                        <div class="col"><label>計劃日期 (訖)</label><input type="date" id="planEndDate"></div>
                    </div>
                    <div class="row">
                        <div class="col"><label>實際日期 (起)</label><input type="date" id="actualStartDate"></div>
                        <div class="col"><label>實際日期 (訖)</label><input type="date" id="actualEndDate"></div>
                    </div>
                </div>

                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <label class="title" style="margin-bottom:0;">📝 工作事項描述</label>
                        <button class="btn-add" onclick="addWorkItem()">+ 新增事項</button>
                    </div>
                    <div id="workItemsContainer">
                        <div class="dynamic-row">
                            <input type="text" class="work-desc" placeholder="請輸入描述..." style="flex:1;">
                            <button class="btn-remove" onclick="this.parentElement.remove()">✖</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-wrapper">
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <label class="title" style="margin-bottom:0;">👷 出工紀錄</label>
                        <button class="btn-add" onclick="addLaborRecord()">+ 新增出工</button>
                    </div>
                    <div class="row" style="margin-bottom: 5px; padding: 0 6px;">
                        <div class="col" style="flex: 1.5;"><label>項目</label></div>
                        <div class="col"><label>當日</label></div>
                        <div class="col"><label>累計</label></div>
                        <div style="width: 35px;"></div>
                    </div>
                    <div id="laborContainer">
                        <div class="dynamic-row">
                            <div class="col" style="flex: 1.5;"><input type="text" class="labor-item" placeholder="工人項目"></div>
                            <div class="col"><input type="number" class="labor-count" placeholder="0" step="0.5"></div>
                            <div class="col"><input type="number" class="labor-total" placeholder="0" readonly style="background:#eee;"></div>
                            <button class="btn-remove" onclick="this.parentElement.remove()">✖</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="title">📌 目前狀態</label>
                    <div class="status-group" style="display:flex; gap:6px;">
                        <div class="toggle-btn" onclick="toggleActive(this)">追蹤</div>
                        <div class="toggle-btn active" onclick="toggleActive(this)">施工中</div>
                        <div class="toggle-btn" onclick="toggleActive(this)">完成</div>
                    </div>
                </div>

                <div class="form-group">
                    <button class="btn-submit" onclick="submitToSupabase()">🚀 儲存並上傳報工單</button>
                </div>
            </div>
        </div>

        <div id="detail-view">
            <div class="panel-wrapper">
                <div class="form-group"><label class="title">📋 今日報工明細回顧</label><div id="reportList">讀取中...</div></div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. 登入檢查邏輯
        const userJson = localStorage.getItem('erp_user');
        if (!userJson) { window.location.href = 'login.html'; }
        const currentUser = JSON.parse(userJson);

        // 初始化資訊
        document.getElementById('welcomeMsg').innerText = `🏗️ 報工系統 - ${currentUser.name} (${currentUser.no})`;
        document.getElementById('staffName').value = currentUser.name;
        if (!currentUser.isManager) { document.getElementById('nav-settings').style.display = 'none'; }

        // 2. 載入 SDK
        import { createClient } from 'https://esm.sh/@supabase/supabase-js'
        const SUPABASE_URL = 'https://uvglebltcpfbciqhziqc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z8UUFXRIt_KrjHY6eWsPfg_eQ4d7Mkb';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('reportDate').valueAsDate = new Date();
        initApp();

        async function initApp() {
            await Promise.all([loadProjectDropdown(), loadCategories(), loadLocationConfig()]);
        }

        // --- 功能函式 ---
        window.handleLogout = () => {
            if(confirm("確定要登出嗎？")) { localStorage.removeItem('erp_user'); window.location.href = 'login.html'; }
        };

        window.toggleActive = (el) => {
            el.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        };

        window.addWorkItem = () => {
            const div = document.createElement('div'); div.className = 'dynamic-row';
            div.innerHTML = `<input type="text" class="work-desc" style="flex:1;"><button class="btn-remove" onclick="this.parentElement.remove()">✖</button>`;
            document.getElementById('workItemsContainer').appendChild(div);
        };

        window.addLaborRecord = () => {
            const div = document.createElement('div'); div.className = 'dynamic-row';
            div.innerHTML = `<div class="col" style="flex: 1.5;"><input type="text" class="labor-item"></div><div class="col"><input type="number" class="labor-count"></div><div class="col"><input type="number" class="labor-total" readonly style="background:#eee;"></div><button class="btn-remove" onclick="this.parentElement.remove()">✖</button>`;
            document.getElementById('laborContainer').appendChild(div);
        };

        // --- 資料載入 ---
        async function loadProjectDropdown() {
            const { data } = await supabase.from('projects').select('project_no, project_name');
            if(data) document.getElementById('projectName').innerHTML = data.map(p => `<option value="${p.project_name}">[${p.project_no}] ${p.project_name}</option>`).join('');
        }

        async function loadCategories() {
            const { data } = await supabase.from('construction_categories').select('*').eq('is_active', true);
            if(data) {
                const main = document.getElementById('mainCategory');
                const sub = document.getElementById('subCategory');
                const mainCats = [...new Set(data.map(i => i.parent_category))];
                main.innerHTML = mainCats.map(c => `<option value="${c}">${c}</option>`).join('');
                main.onchange = () => {
                    const filtered = data.filter(i => i.parent_category === main.value);
                    sub.innerHTML = filtered.map(s => `<option value="${s.sub_category}">${s.sub_category}</option>`).join('');
                };
                main.dispatchEvent(new Event('change'));
            }
        }

        async function loadLocationConfig() {
            const { data } = await supabase.from('system_configs').select('*').eq('config_key', 'location_settings').single();
            if(data) {
                document.getElementById('buildingGroup').innerHTML = data.config_value.buildings.map(b => `<div class="checkbox-item"><input type="checkbox" name="building" value="${b}"><span>${b}</span></div>`).join('');
                document.getElementById('floorGroup').innerHTML = data.config_value.floors.map(f => `<div class="checkbox-item"><input type="checkbox" name="floor" value="${f}"><span>${f}</span></div>`).join('');
            }
        }

        // --- 儲存邏輯 ---
        window.submitToSupabase = async () => {
            try {
                const mainData = {
                    project_name: document.getElementById('projectName').value,
                    staff_name: currentUser.name,
                    report_date: document.getElementById('reportDate').value,
                    report_type: document.querySelector('.type-group .toggle-btn.active').innerText,
                    category: document.getElementById('mainCategory').value,
                    sub_category: document.getElementById('subCategory').value,
                    buildings: Array.from(document.querySelectorAll('input[name="building"]:checked')).map(el => el.value),
                    floors: Array.from(document.querySelectorAll('input[name="floor"]:checked')).map(el => el.value),
                    plan_start_date: document.getElementById('planStartDate').value || null,
                    plan_end_date: document.getElementById('planEndDate').value || null,
                    actual_start_date: document.getElementById('actualStartDate').value || null,
                    actual_end_date: document.getElementById('actualEndDate').value || null,
                    status: document.querySelector('.status-group .toggle-btn.active').innerText
                };

                const { data: report, error: rError } = await supabase.from('daily_reports').insert([mainData]).select().single();
                if(rError) throw rError;

                const items = Array.from(document.querySelectorAll('.work-desc')).map(i => ({ report_id: report.id, description: i.value })).filter(v => v.description);
                if(items.length > 0) await supabase.from('report_work_items').insert(items);

                const labors = Array.from(document.querySelectorAll('#laborContainer .dynamic-row')).map(row => ({
                    report_id: report.id,
                    item_name: row.querySelector('.labor-item').value,
                    today_count: parseFloat(row.querySelector('.labor-count').value || 0),
                    total_count: 0 // 累計邏輯可視需求開發
                })).filter(v => v.item_name);
                if(labors.length > 0) await supabase.from('report_labor_records').insert(labors);

                alert("🎉 報工成功！"); location.reload();
            } catch(e) { alert("錯誤: " + e.message); }
        };

        // --- 導覽切換 ---
        const btnForm = document.getElementById('nav-form');
        const btnList = document.getElementById('nav-list');
        btnForm.onclick = () => { btnForm.classList.add('active'); btnList.classList.remove('active'); document.getElementById('form-view').style.display = 'grid'; document.getElementById('detail-view').style.display = 'none'; };
        btnList.onclick = async () => { 
            btnForm.classList.remove('active'); btnList.classList.add('active'); 
            document.getElementById('form-view').style.display = 'none'; 
            document.getElementById('detail-view').style.display = 'block';
            await fetchTodayReports();
        };

        async function fetchTodayReports() {
            const { data } = await supabase.from('daily_reports').select('*, report_labor_records(*)').eq('report_date', new Date().toISOString().split('T')[0]).order('created_at', {ascending:false});
            const listEl = document.getElementById('reportList');
            if(!data || data.length === 0) { listEl.innerHTML = "今日尚無資料"; return; }
            listEl.innerHTML = data.map(r => `<div class="report-card"><strong>📍 ${r.project_name} [${r.report_type}]</strong><br><small>${r.category} / ${r.sub_category} (${r.status})</small></div>`).join('');
        }
    </script>
</body>
</html>
