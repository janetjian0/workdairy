<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場報工系統 - 登入</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e2b3c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 350px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #7f8c8d; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #3498db; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #2980b9; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">🏗️ 現場報工系統</div>
        <div class="form-group">
            <label>員工編號</label>
            <input type="text" id="staffNo" placeholder="請輸入編號 (如: E001)" required>
        </div>
        <div class="form-group">
            <label>登入密碼</label>
            <input type="password" id="password" placeholder="請輸入密碼" required>
        </div>
        <button class="btn-login" onclick="handleLogin()">登入系統</button>
        <div id="errorMsg" class="error-msg">❌ 編號或密碼錯誤，請重新輸入</div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js'
        
        const SUPABASE_URL = 'https://uvglebltcpfbciqhziqc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z8UUFXRIt_KrjHY6eWsPfg_eQ4d7Mkb';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.handleLogin = async () => {
            const staffNo = document.getElementById('staffNo').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!staffNo || !password) {
                alert("請填寫編號與密碼");
                return;
            }

            // 查詢資料庫
            const { data, error } = await supabase
                .from('staff')
                .select('*')
                .eq('staff_no', staffNo)
                .eq('password', password)
                .single();

            if (error || !data) {
                errorMsg.style.display = 'block';
                return;
            }

            // 登入成功：儲存資訊並跳轉
            const userInfo = {
                id: data.id,
                no: data.staff_no,
                name: data.name,
                isManager: data.is_manager
            };
            localStorage.setItem('erp_user', JSON.stringify(userInfo));
            
            window.location.href = 'index.html';
        };

        // 支援 Enter 鍵登入
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
